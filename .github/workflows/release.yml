name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Validate versions and release tag
        shell: pwsh
        run: |
          $packageJson = Get-Content package.json | ConvertFrom-Json
          $tauriConfig = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json

          $cargoVersionLine = Get-Content src-tauri/Cargo.toml | Select-String -Pattern '^\s*version\s*=\s*"([^"]+)"\s*$' | Select-Object -First 1
          if (-not $cargoVersionLine) {
            throw "Could not parse Rust package version from src-tauri/Cargo.toml."
          }
          $cargoVersion = [regex]::Match($cargoVersionLine.Line, '^\s*version\s*=\s*"([^"]+)"\s*$').Groups[1].Value

          if ($packageJson.version -ne $tauriConfig.version) {
            throw "Version mismatch: package.json is $($packageJson.version) while src-tauri/tauri.conf.json is $($tauriConfig.version)."
          }
          if ($packageJson.version -ne $cargoVersion) {
            throw "Version mismatch: package.json is $($packageJson.version) while src-tauri/Cargo.toml is $cargoVersion."
          }

          if ($env:GITHUB_REF_TYPE -eq "tag") {
            if ($env:GITHUB_REF_NAME -notmatch '^v\d+\.\d+\.\d+$') {
              throw "Release tags must use SemVer format vX.Y.Z. Received: $env:GITHUB_REF_NAME"
            }
            $tagVersion = $env:GITHUB_REF_NAME.Substring(1)
            if ($tagVersion -ne $packageJson.version) {
              throw "Tag/version mismatch: tag is $env:GITHUB_REF_NAME but app version is $($packageJson.version)."
            }
          }

      - name: Build Windows NSIS installer
        run: npm run tauri build

      - name: Verify NSIS artifact
        shell: pwsh
        run: |
          $artifacts = @(Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe -File)
          if ($artifacts.Count -eq 0) {
            throw "No NSIS .exe artifact found in src-tauri/target/release/bundle/nsis."
          }
          if ($artifacts.Count -ne 1) {
            $names = $artifacts | ForEach-Object { $_.Name } | Sort-Object
            throw "Expected exactly one NSIS .exe artifact, found $($artifacts.Count): $($names -join ', ')"
          }
          Write-Host "NSIS installer ready: $($artifacts[0].FullName)"

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
